<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeRelay — Professional Parent Reports in 60 Seconds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=DM+Serif+Display&family=Playfair+Display:wght@700;800&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #14b8a6;
            --teal-light: #5eead4;
            --purple: #7c3aed;
            --purple-light: #a78bfa;
            --magenta: #ec4899;
            --magenta-light: #f472b6;
            --white: #ffffff;
            --text-dark: #111827;
            --text-gray: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Archivo', sans-serif; overflow-x: hidden; }

        /* Landing Page Wrapper */
        .landing-wrapper { background: var(--white); min-height: 100vh; position: relative; }
        .gradient-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; pointer-events: none; z-index: 0; }
        .orb-1 { top: -10%; right: -5%; width: 500px; height: 500px; background: linear-gradient(135deg, var(--teal-light) 0%, var(--purple-light) 100%); }
        .orb-2 { bottom: -15%; left: -10%; width: 600px; height: 600px; background: linear-gradient(135deg, var(--magenta-light) 0%, var(--purple) 100%); }

        /* App Background */
        .app-outer-bg {
            background-color: #0a3d3d;
            background-image:
                radial-gradient(ellipse 80% 60% at 0% 0%, #0e7490 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 100% 20%, #7c3aed 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 15% 100%, #2dd4c8 0%, transparent 50%),
                radial-gradient(ellipse 45% 40% at 100% 90%, #6d28d9 0%, transparent 55%),
                radial-gradient(ellipse 35% 30% at 50% 50%, #0f766e 0%, transparent 60%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .hero-title { font-family: 'DM Serif Display', serif; font-size: 58px; line-height: 1.15; color: var(--text-dark); margin-bottom: 25px; }
        .hero-title .highlight { background: linear-gradient(135deg, var(--purple) 0%, var(--magenta) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        const LandingPage = ({ onAuthTrigger }) => (
            <div className="landing-wrapper">
                <div className="gradient-orb orb-1"></div>
                <div className="gradient-orb orb-2"></div>
                
                <header style={{padding: '30px 40px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'relative', zIndex: 10}}>
                    <div style={{display: 'flex', alignItems: 'center', gap: '15px'}}>
                        <div style={{width: '45px', height: '45px', background: '#0a3d3d', borderRadius: '10px'}}></div>
                        <span style={{fontFamily: 'DM Serif Display', fontSize: '26px'}}>GradeRelay</span>
                    </div>
                    <div style={{display: 'flex', gap: '15px'}}>
                        <button onClick={() => onAuthTrigger('login')} style={{padding: '12px 28px', border: '1px solid #ddd', borderRadius: '8px', background: 'white', cursor: 'pointer', fontWeight: 600}}>Sign In</button>
                        <button onClick={() => onAuthTrigger('signup')} style={{padding: '12px 28px', background: 'linear-gradient(135deg, var(--purple) 0%, var(--magenta) 100%)', border: 'none', borderRadius: '8px', color: 'white', cursor: 'pointer', fontWeight: 600}}>Sign Up / Start 5 Free Reports</button>
                    </div>
                </header>

                <main style={{maxWidth: '1250px', margin: '0 auto', padding: '120px 20px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '60px', alignItems: 'center', position: 'relative', zIndex: 1}}>
                    <div>
                        <div style={{background: 'var(--teal)', color: 'white', padding: '6px 16px', borderRadius: '20px', display: 'inline-block', fontSize: '13px', fontWeight: 'bold', marginBottom: '25px'}}>✨ Free Plan: 5 Reports/Month</div>
                        <h1 className="hero-title">Professional Parent Reports in <span className="highlight">60 Seconds</span></h1>
                        <p style={{fontSize: '20px', color: 'var(--text-gray)', marginBottom: '40px', lineHeight: '1.6'}}>Generate comprehensive, personalized progress reports for every student. Built by a Brooklyn teacher to save you hours of work.</p>
                        <div style={{display: 'flex', gap: '15px'}}>
                            <button onClick={() => onAuthTrigger('signup')} style={{padding: '18px 40px', background: 'linear-gradient(135deg, var(--purple) 0%, var(--magenta) 100%)', color: 'white', border: 'none', borderRadius: '10px', fontSize: '17px', fontWeight: 'bold', cursor: 'pointer'}}>Start Creating Reports</button>
                            <button style={{padding: '18px 40px', background: 'white', color: 'var(--purple)', border: '2px solid var(--purple)', borderRadius: '10px', fontSize: '17px', fontWeight: 'bold', cursor: 'pointer'}}>Watch Demo</button>
                        </div>
                    </div>
                    <div style={{background: 'white', borderRadius: '16px', padding: '40px', boxShadow: '0 20px 60px rgba(0,0,0,0.06)', border: '1px solid #eee'}}>
                        <h3 style={{fontFamily: 'DM Serif Display', fontSize: '24px', marginBottom: '20px'}}>Sample Weekly Report</h3>
                        <div style={{padding: '20px', background: '#f0fdfa', borderRadius: '10px', borderLeft: '4px solid var(--teal)'}}>
                            <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '10px'}}>
                                <span style={{fontWeight: 700}}>Mathematics</span>
                                <span style={{color: 'var(--teal)', fontWeight: 700}}>A-</span>
                            </div>
                            <p style={{fontSize: '14px', color: '#4b5563', lineHeight: '1.5'}}>Excellent work on multi-digit multiplication! Shows strong understanding of the area model and demonstrates persistence on challenging problems.</p>
                        </div>
                    </div>
                </main>
            </div>
        );

        function MainApp() {
            const [view, setView] = useState('landing');
            const [mode, setMode] = useState('signup');

            const handleAuth = (authMode) => {
                setMode(authMode);
                setView('app');
            };

            if (view === 'landing') {
                return <LandingPage onAuthTrigger={handleAuth} />;
            }

            return (
                <div className="app-outer-bg">
                    <div style={{padding: '100px', textAlign: 'center', color: 'white'}}>
                        <h2 style={{fontFamily: 'Playfair Display', fontSize: '36px', marginBottom: '20px'}}>App Stage Reached</h2>
                        <div style={{background: 'white', color: '#111', padding: '40px', borderRadius: '15px', maxWidth: '400px', margin: '0 auto'}}>
                            <p style={{marginBottom: '20px'}}>Navigation is now working. Users can enter the {mode === 'login' ? 'Sign In' : 'Sign Up'} flow.</p>
                            <button onClick={() => setView('landing')} style={{padding: '10px 20px', background: '#7c3aed', color: 'white', border: 'none', borderRadius: '8px', cursor: 'pointer'}}>Back to Landing</button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
