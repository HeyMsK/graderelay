<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeRelay - Professional Parent Progress Reports in 60 Seconds</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=DM+Serif+Display&family=Playfair+Display:wght@700;800&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* Shared CSS Variables */
        :root {
            --teal: #14b8a6;
            --teal-light: #5eead4;
            --purple: #7c3aed;
            --purple-light: #a78bfa;
            --magenta: #ec4899;
            --magenta-light: #f472b6;
            --white: #ffffff;
            --text-dark: #111827;
            --text-gray: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Archivo', sans-serif; overflow-x: hidden; }

        /* Landing Page Specific Styles */
        .landing-wrapper { background: var(--white); min-height: 100vh; position: relative; }
        .gradient-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; pointer-events: none; z-index: 0; }
        .orb-1 { top: -10%; right: -5%; width: 500px; height: 500px; background: linear-gradient(135deg, var(--teal-light) 0%, var(--purple-light) 100%); }
        .orb-2 { bottom: -15%; left: -10%; width: 600px; height: 600px; background: linear-gradient(135deg, var(--magenta-light) 0%, var(--purple) 100%); }

        /* App Background Logic */
        .app-outer-bg {
            background-color: #0a3d3d;
            background-image:
                radial-gradient(ellipse 80% 60% at 0% 0%, #0e7490 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 100% 20%, #7c3aed 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 15% 100%, #2dd4c8 0%, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* Demo Animation Styles */
        .demo-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .demo-window { background: white; width: 100%; max-width: 600px; border-radius: 12px; overflow: hidden; animation: zoomIn 0.3s ease-out; }
        .demo-typing { border-right: 2px solid var(--teal); white-space: nowrap; overflow: hidden; display: inline-block; animation: typing 3.5s steps(40, end) infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* General Helper Classes */
        .btn-signup { background: linear-gradient(135deg, var(--purple) 0%, var(--magenta) 100%); color: white; text-decoration: none; padding: 12px 28px; border-radius: 8px; font-weight: 600; }
        .hero-title { font-family: 'DM Serif Display', serif; font-size: 58px; line-height: 1.15; color: var(--text-dark); }
        .hero-title .highlight { background: linear-gradient(135deg, var(--purple) 0%, var(--magenta) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <script>
        /* Core System Config */
        window.GR_SUPA_URL = "https://lzsfvzovzizzvrnkzsrk.supabase.co";
        window.GR_SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6c2Z2em92eml6enZybmt6c3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MDUwMDksImV4cCI6MjA5MDM4MTAwOX0.uwxxiUI1XlEwiu1Jq6cqyG27gagLCnQ2Y7icQRgGqLM";
        window.GR_FREE_LIMIT = 5;
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- COMPONENTS ---

        const DemoModal = ({ onClose }) => (
            <div className="demo-overlay" onClick={onClose}>
                <div className="demo-window" onClick={e => e.stopPropagation()} style={{padding: '30px'}}>
                    <h3 style={{fontFamily: 'DM Serif Display', marginBottom: '15px'}}>GradeRelay Report Generator</h3>
                    <div style={{background: '#f9fafb', padding: '20px', borderRadius: '8px', border: '1px solid #eee'}}>
                        <p style={{fontSize: '12px', color: '#666', marginBottom: '5px'}}>Selected: Mathematics</p>
                        <div className="demo-typing" style={{fontSize: '18px', color: '#111827', fontFamily: 'Georgia'}}>
                            "Excellent work on multi-digit multiplication..."
                        </div>
                    </div>
                    <button onClick={onClose} style={{marginTop: '20px', padding: '10px 20px', background: '#7c3aed', color: 'white', border: 'none', borderRadius: '5px', cursor: 'pointer'}}>Close Demo</button>
                </div>
            </div>
        );

        const LandingPage = ({ onStart }) => {
            const [showDemo, setShowDemo] = useState(false);

            return (
                <div className="landing-wrapper">
                    <div className="gradient-orb orb-1"></div>
                    <div className="gradient-orb orb-2"></div>

                    {showDemo && <DemoModal onClose={() => setShowDemo(false)} />}

                    <header style={{padding: '30px 40px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'relative', zIndex: 10}}>
                        <div style={{display: 'flex', alignItems: 'center', gap: '15px'}}>
                            <div style={{width: '40px', height: '40px', background: '#0a3d3d', borderRadius: '8px'}}></div>
                            <span style={{fontFamily: 'DM Serif Display', fontSize: '28px'}}>GradeRelay</span>
                        </div>
                        <div style={{display: 'flex', gap: '15px'}}>
                            <button onClick={onStart} style={{padding: '12px 28px', border: '1px solid #ddd', borderRadius: '8px', background: '#f9fafb', cursor: 'pointer'}}>Sign In</button>
                            <button onClick={onStart} className="btn-signup" style={{border: 'none', cursor: 'pointer'}}>Get Started Free</button>
                        </div>
                    </header>

                    <main style={{maxWidth: '1200px', margin: '0 auto', padding: '100px 20px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '60px', alignItems: 'center', position: 'relative', zIndex: 1}}>
                        <div>
                            <div style={{background: 'var(--teal)', color: 'white', padding: '6px 16px', borderRadius: '20px', display: 'inline-block', fontSize: '13px', fontWeight: 'bold', marginBottom: '20px'}}>✨ Free Plan: 5 Reports/Month</div>
                            <h1 className="hero-title">Professional Parent Reports in <span className="highlight">60 Seconds</span></h1>
                            <p style={{fontSize: '20px', color: 'var(--text-gray)', margin: '30px 0 40px'}}>Generate comprehensive, personalized progress reports for every student. Built by a Brooklyn teacher.</p>
                            <div style={{display: 'flex', gap: '15px'}}>
                                <button onClick={onStart} style={{padding: '18px 40px', background: 'linear-gradient(135deg, var(--purple), var(--magenta))', color: 'white', border: 'none', borderRadius: '10px', fontSize: '17px', fontWeight: 'bold', cursor: 'pointer'}}>Start Creating Reports</button>
                                <button onClick={() => setShowDemo(true)} style={{padding: '18px 40px', background: 'white', color: 'var(--purple)', border: '2px solid var(--purple)', borderRadius: '10px', fontSize: '17px', fontWeight: 'bold', cursor: 'pointer'}}>Watch Demo</button>
                            </div>
                        </div>

                        <div style={{background: 'white', borderRadius: '16px', padding: '40px', boxShadow: '0 20px 60px rgba(0,0,0,0.08)', border: '1px solid #f3f4f6'}}>
                            <h3 style={{fontFamily: 'DM Serif Display', fontSize: '24px', marginBottom: '20px'}}>Sample Weekly Report</h3>
                            <div style={{marginBottom: '20px', paddingBottom: '20px', borderBottom: '1px solid #eee'}}>
                                <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '10px'}}>
                                    <span style={{fontWeight: '600'}}>Mathematics</span>
                                    <span style={{background: 'var(--teal)', color: 'white', padding: '4px 12px', borderRadius: '20px', fontSize: '12px'}}>A-</span>
                                </div>
                                <p style={{fontSize: '14px', color: '#6b7280'}}>Excellent work on multi-digit multiplication! Demonstrates persistence on challenging word problems.</p>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        // --- AUTH & GENERATOR WRAPPER ---

        function MainSystem() {
            const [view, setView] = useState('landing');
            const supa = useMemo(() => window.supabase.createClient(window.GR_SUPA_URL, window.GR_SUPA_KEY), []);

            if (view === 'landing') return <LandingPage onStart={() => setView('app')} />;

            return (
                <div className="app-outer-bg">
                    {/* Integrated Generator App from index(90).html logic here */}
                    <div style={{padding: '100px', textAlign: 'center', color: 'white'}}>
                        <h2 style={{fontFamily: 'Playfair Display'}}>Report Generator Initializing...</h2>
                        <p>Welcome back, Teacher.</p>
                        <button onClick={() => setView('landing')} style={{marginTop: '20px', cursor: 'pointer'}}>Sign Out</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainSystem />);
    </script>
</body>
</html>
