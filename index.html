<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeRelay — Professional Parent Reports in 60 Seconds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=DM+Serif+Display&family=Playfair+Display:wght@700;800&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #14b8a6; --teal-light: #5eead4; --purple: #7c3aed;
            --purple-light: #a78bfa; --magenta: #ec4899; --magenta-light: #f472b6;
            --white: #ffffff; --text-dark: #111827; --text-gray: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Archivo', sans-serif; overflow-x: hidden; }

        /* Landing Background */
        .landing-wrapper { background: var(--white); min-height: 100vh; position: relative; }
        .gradient-orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.3; pointer-events: none; z-index: 0; }
        .orb-1 { top: -10%; right: -5%; width: 500px; height: 500px; background: linear-gradient(135deg, var(--teal-light) 0%, var(--purple-light) 100%); }
        .orb-2 { bottom: -15%; left: -10%; width: 600px; height: 600px; background: linear-gradient(135deg, var(--magenta-light) 0%, var(--purple) 100%); }

        /* App/Auth Background */
        .app-bg {
            background-color: #0a3d3d;
            background-image: radial-gradient(ellipse 80% 60% at 0% 0%, #0e7490 0%, transparent 60%),
                              radial-gradient(ellipse 60% 50% at 100% 20%, #7c3aed 0%, transparent 55%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        /* Hero Text */
        .hero-title { font-family: 'DM Serif Display', serif; font-size: 58px; line-height: 1.1; color: var(--text-dark); margin-bottom: 25px; }
        .highlight { background: linear-gradient(135deg, var(--purple) 0%, var(--magenta) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Demo Animation */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .demo-window { background: #2d1b69; width: 100%; max-width: 600px; border-radius: 20px; color: white; padding: 40px; animation: zoomIn 0.3s ease-out; }
        .typing-cursor { border-right: 2px solid var(--teal); animation: blink 0.7s infinite; }
        
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- WATCH DEMO COMPONENT ---
        const DemoModal = ({ onClose, onStart }) => {
            const [step, setStep] = useState(1);
            const [text, setText] = useState("");
            const fullText = "Alex is showing great progress in Mathematics. They are consistently participating in class discussions and mastering multi-digit multiplication...";

            useEffect(() => {
                if (step === 3) {
                    let i = 0;
                    const interval = setInterval(() => {
                        setText(fullText.slice(0, i));
                        i++;
                        if (i > fullText.length) clearInterval(interval);
                    }, 30);
                    return () => clearInterval(interval);
                }
            }, [step]);

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="demo-window" onClick={e => e.stopPropagation()}>
                        <h2 style={{fontFamily: 'Playfair Display', marginBottom: 15}}>GradeRelay Demo</h2>
                        {step === 1 && (
                            <div>
                                <p style={{marginBottom: 20}}>1. Input Student Details</p>
                                <div style={{background: 'rgba(255,255,255,0.1)', padding: 15, borderRadius: 10, marginBottom: 10}}>Grade: 4th Grade</div>
                                <div style={{background: 'rgba(255,255,255,0.1)', padding: 15, borderRadius: 10, marginBottom: 20}}>Subject: Mathematics</div>
                                <button onClick={() => setStep(2)} style={{width: '100%', padding: 15, background: 'var(--purple)', color: 'white', border: 'none', borderRadius: 10, fontWeight: 'bold', cursor: 'pointer'}}>Next Step</button>
                            </div>
                        )}
                        {step === 2 && (
                            <div>
                                <p style={{marginBottom: 20}}>2. Select Teacher Observations</p>
                                <div style={{background: 'var(--teal)', padding: 10, borderRadius: 5, marginBottom: 10}}>✓ Strong participation in class</div>
                                <div style={{background: 'var(--teal)', padding: 10, borderRadius: 5, marginBottom: 20}}>✓ Mastering new concepts quickly</div>
                                <button onClick={() => setStep(3)} style={{width: '100%', padding: 15, background: 'var(--purple)', color: 'white', border: 'none', borderRadius: 10, fontWeight: 'bold', cursor: 'pointer'}}>Generate Report</button>
                            </div>
                        )}
                        {step === 3 && (
                            <div>
                                <p style={{marginBottom: 20}}>3. Generated Report</p>
                                <div style={{background: 'white', color: '#111', padding: 20, borderRadius: 10, minHeight: 120, fontFamily: 'Georgia'}}>
                                    {text}<span className="typing-cursor">|</span>
                                </div>
                                <button onClick={onStart} style={{marginTop: 20, width: '100%', padding: 15, background: 'linear-gradient(135deg, var(--purple), var(--magenta))', color: 'white', border: 'none', borderRadius: 10, fontWeight: 'bold', cursor: 'pointer'}}>Try it Yourself Free</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- MAIN APP LOGIC ---
        function GradeRelayApp() {
            const [view, setView] = useState('landing'); // 'landing' or 'app'
            const [showDemo, setShowDemo] = useState(false);

            const enterApp = () => {
                setShowDemo(false);
                setView('app');
            };

            if (view === 'landing') {
                return (
                    <div className="landing-wrapper">
                        <div className="gradient-orb orb-1"></div>
                        <div className="gradient-orb orb-2"></div>
                        {showDemo && <DemoModal onClose={() => setShowDemo(false)} onStart={enterApp} />}

                        <header style={{padding: '30px 40px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', position: 'relative', zIndex: 10}}>
                            <div style={{display: 'flex', alignItems: 'center', gap: 15}}>
                                <div style={{width: 45, height: 45, background: '#0a3d3d', borderRadius: 10}}></div>
                                <span style={{fontFamily: 'DM Serif Display', fontSize: 28}}>GradeRelay</span>
                            </div>
                            <div style={{display: 'flex', gap: 12}}>
                                <button onClick={enterApp} style={{padding: '10px 24px', border: '1px solid #ddd', borderRadius: 8, background: 'white', cursor: 'pointer', fontWeight: 600}}>Sign In</button>
                                <button onClick={enterApp} style={{padding: '10px 24px', background: 'linear-gradient(135deg, var(--purple), var(--magenta))', color: 'white', border: 'none', borderRadius: 8, cursor: 'pointer', fontWeight: 600}}>Sign Up / Start 5 Free Reports</button>
                            </div>
                        </header>

                        <main style={{maxWidth: 1200, margin: '0 auto', padding: '100px 20px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 60, alignItems: 'center', position: 'relative', zIndex: 1}}>
                            <div>
                                <div style={{background: 'var(--teal)', color: 'white', padding: '6px 16px', borderRadius: 20, display: 'inline-block', fontSize: 13, fontWeight: 'bold', marginBottom: 20}}>✨ Free Plan: 5 Reports/Month</div>
                                <h1 className="hero-title">Professional Parent Reports in <span className="highlight">60 Seconds</span></h1>
                                <p style={{fontSize: 20, color: 'var(--text-gray)', marginBottom: 40}}>The #1 tool for teachers to generate high-quality, personalized progress updates instantly.</p>
                                <div style={{display: 'flex', gap: 15}}>
                                    <button onClick={enterApp} style={{padding: '18px 40px', background: 'linear-gradient(135deg, var(--purple), var(--magenta))', color: 'white', border: 'none', borderRadius: 10, fontSize: 17, fontWeight: 'bold', cursor: 'pointer'}}>Start Your 5 Free Reports</button>
                                    <button onClick={() => setShowDemo(true)} style={{padding: '18px 40px', background: 'white', color: 'var(--purple)', border: '2px solid var(--purple)', borderRadius: 10, fontSize: 17, fontWeight: 'bold', cursor: 'pointer'}}>Watch Demo</button>
                                </div>
                            </div>

                            <div style={{background: 'white', borderRadius: 16, padding: 40, boxShadow: '0 20px 60px rgba(0,0,0,0.06)', border: '1px solid #eee'}}>
                                <h3 style={{fontFamily: 'DM Serif Display', fontSize: 24, marginBottom: 20}}>Sample Student Report</h3>
                                <div style={{marginBottom: 20, paddingBottom: 15, borderBottom: '1px solid #f0f0f0'}}>
                                    <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: 5}}><span style={{fontWeight: 700}}>Mathematics</span><span style={{color: 'var(--teal)', fontWeight: 700}}>A-</span></div>
                                    <p style={{fontSize: 14, color: '#666'}}>Demonstrates exceptional problem-solving skills in multi-digit multiplication.</p>
                                </div>
                                <div style={{marginBottom: 20}}>
                                    <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: 5}}><span style={{fontWeight: 700}}>Reading / ELA</span><span style={{color: 'var(--purple)', fontWeight: 700}}>B+</span></div>
                                    <p style={{fontSize: 14, color: '#666'}}>Consistently uses text evidence to support answers during group discussions.</p>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            return (
                <div className="app-bg">
                    <div style={{textAlign: 'center', color: 'white', background: 'rgba(255,255,255,0.1)', padding: 60, borderRadius: 20, backdropFilter: 'blur(10px)'}}>
                        <div style={{background: '#fff', color: '#4c1d95', padding: '5px 15px', borderRadius: 20, fontSize: 12, fontWeight: 700, display: 'inline-block', marginBottom: 20}}>
                            5 free reports left
                        </div>
                        <h2 style={{fontFamily: 'Playfair Display', fontSize: 32, marginBottom: 10}}>Welcome to GradeRelay</h2>
                        <p style={{opacity: 0.8, marginBottom: 30}}>Connecting Teachers & Families, One Report at a Time.</p>
                        <button onClick={() => setView('landing')} style={{padding: '12px 30px', background: 'var(--purple)', border: 'none', color: 'white', borderRadius: 10, cursor: 'pointer'}}>Sign Out</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GradeRelayApp />);
    </script>
</body>
</html>
