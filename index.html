              </div>

              {/* SUBJECT PROMPTS SECTION */}
              <div className="card" style={{background: 'white', borderRadius: '16px', padding: '30px', marginBottom: '20px'}}>
                <h3 style={{fontFamily: 'Playfair Display', marginBottom: '10px'}}>Subject-Specific Feedback</h3>
                <div style={{display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '20px'}}>
                  {Object.keys(SUBJECT_PROMPTS).map(subj => (
                    <button key={subj} onClick={() => { setActiveSubject(subj); setSelectedSubjectPrompts([]); }} style={{padding: '8px 16px', borderRadius: '20px', border: 'none', cursor: 'pointer', background: activeSubject === subj ? SUBJECT_PROMPTS[subj].color : '#f3f4f6', color: activeSubject === subj ? 'white' : '#333', fontSize: '13px', fontWeight: 'bold'}}>{subj}</button>
                  ))}
                </div>
                {activeSubject && (
                  <div>
                    <p style={{fontSize: '12px', fontWeight: 'bold', marginBottom: '10px', color: '#666'}}>STRENGTHS</p>
                    {SUBJECT_PROMPTS[activeSubject].strengths.map(p => (
                      <button key={p} onClick={() => setSelectedSubjectPrompts(prev => prev.includes(p) ? prev.filter(x => x !== p) : [...prev, p])} style={{display: 'block', width: '100%', textAlign: 'left', padding: '10px', marginBottom: '5px', borderRadius: '6px', border: '1px solid #eee', background: selectedSubjectPrompts.includes(p) ? SUBJECT_PROMPTS[activeSubject].bg : 'white', fontSize: '13px'}}>{selectedSubjectPrompts.includes(p) ? '✓ ' : ''}{p}</button>
                    ))}
                  </div>
                )}
              </div>

              <button onClick={() => { setEditedReport(generateReport()); setStep("preview"); }} style={{width: '100%', padding: '20px', background: 'linear-gradient(135deg, #4c1d95, #7c3aed)', color: 'white', border: 'none', borderRadius: '12px', fontSize: '18px', fontWeight: 'bold', cursor: 'pointer', boxShadow: '0 10px 30px rgba(0,0,0,0.3)'}}>
                ✨ Generate Report
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="app-outer-bg" style={{padding: '80px 16px'}}>
          <div className="card" style={{background: 'white', borderRadius: '16px', padding: '30px', maxWidth: '700px', margin: '0 auto'}}>
             <h2 style={{fontFamily: 'Playfair Display', marginBottom: '20px'}}>Report Preview</h2>
             <textarea value={editedReport} onChange={e => setEditedReport(e.target.value)} style={{width: '100%', minHeight: '300px', padding: '15px', borderRadius: '8px', border: '1px solid #ddd', fontFamily: 'Georgia', lineHeight: '1.6', fontSize: '15px'}} />
             <div style={{display: 'flex', gap: '10px', marginTop: '20px'}}>
               <button onClick={() => setStep("form")} style={{flex: 1, padding: '15px', borderRadius: '8px', border: '1px solid #ddd', background: 'white', cursor: 'pointer'}}>← Back</button>
               <button onClick={handleCopy} style={{flex: 2, padding: '15px', borderRadius: '8px', border: 'none', background: copied ? '#059669' : '#4c1d95', color: 'white', fontWeight: 'bold', cursor: 'pointer'}}>{copied ? '✓ Copied!' : '📋 Copy Report'}</button>
             </div>
          </div>
        </div>
      );
    }

    // --- AUTH & PLAN WRAPPER ---
    function AuthWrapper() {
      const [view, setView] = useState('landing');
      const [authStep, setAuthStep] = useState("loading");
      const [user, setUser] = useState(null);
      const [profile, setProfile] = useState(null);

      const supa = useMemo(() => window.supabase.createClient(window.GR_SUPA_URL, window.GR_SUPA_KEY), []);

      useEffect(() => {
        supa.auth.getSession().then(({ data: { session } }) => {
          if (session?.user) { setUser(session.user); setAuthStep("app"); } 
          else setAuthStep("login");
        });
      }, [supa]);

      if (view === 'landing') return <LandingPage onStart={() => setView('app')} />;

      // Simplified App logic for this merged version
      return <MainAppGenerator onGenerateReport={() => true} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AuthWrapper />);
  </script>
</body>
</html>
